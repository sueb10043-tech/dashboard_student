<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 운영 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Public Sans(숫자용)와 고운 돋움(한글용) 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Gowun+Dodum:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #d8eeff;
            color: #444;
            user-select: none;
        }

        .window-frame {
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .window-header {
            background: #f3f4f6;
            padding: 6px 12px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid #e5e7eb;
            height: 24px;
            flex-shrink: 0;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; }

        .browser-header {
            background: #f3f4f6;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        .address-bar-container {
            background: white;
            flex-grow: 1;
            height: 28px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 12px;
        }

        #blackboard-input {
            width: 100%;
            height: 100%;
            padding: 12px;
            border: none;
            outline: none;
            overflow-y: auto;
            line-height: 1.6;
            color: #333;
            font-family: 'Gowun Dodum', sans-serif;
            font-weight: bold;
            white-space: pre-wrap;
            word-break: break-all;
            user-select: text;
        }

        #display-time { font-family: 'Public Sans', sans-serif; letter-spacing: 0.05em; }
        #display-date { font-family: 'Gowun Dodum', sans-serif; letter-spacing: 0; }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* 시정표 아이템 레이아웃 */
        .schedule-item {
            display: flex;
            align-items: flex-end; 
            padding: 0px 10px 15px 21px; 
            border-bottom: 1px solid #f3f4f6;
            font-size: 1.7rem;
            font-weight: 500;
            height: 64px; 
            box-sizing: border-box;
            transition: background-color 0.5s ease;
        }
        
        .schedule-label {
            width: 110px; /* 지시하신 대로 110px 유지 */
            flex-shrink: 0;
            color: #0891b2;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.1em;
            line-height: 1;
        }

        .schedule-time {
            flex-grow: 1;
            text-align: left;
            padding-left: 18px; 
            font-family: 'Public Sans', sans-serif;
            font-weight: 400;
            color: #6b7280;
            line-height: 1;
            white-space: nowrap; /* 줄바꿈 방지 */
        }

        .active-period { background-color: #fff9db !important; }

        #schedule-list {
            min-height: 384px; /* 60vh 높이에 맞춰 최소 높이 확보 */
            background: white;
        }

        .schedule-tab-btn {
            font-size: 9px; font-weight: 900; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 4px; background: #f3f4f6; color: #d1d5db;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .schedule-tab-btn.active { background: white; color: #0891b2; border-color: #0891b2; }

        .dock-container {
            position: fixed; bottom: 10px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100; pointer-events: none; 
        }

        .dock-bar {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px);
            border-radius: 1.5rem; padding: 10px 22px; display: flex; gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.5);
            align-items: center; pointer-events: auto; 
        }

        .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .app-icon-wrapper:hover { transform: translateY(-6px); }
        .app-icon-box { width: 52px; height: 52px; border-radius: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.08), inset 0 2px 4px rgba(255,255,255,0.8); position: relative; overflow: hidden; }

        .bg-app-blue { background: linear-gradient(145deg, #e0f2fe, #bae6fd); }
        .bg-app-green { background: linear-gradient(145deg, #f0fdf4, #dcfce7); }
        .bg-app-yellow { background: linear-gradient(145deg, #fffbeb, #fef3c7); }
        .bg-app-purple { background: linear-gradient(145deg, #faf5ff, #f3e8ff); }
        .bg-app-gray { background: linear-gradient(145deg, #f9fafb, #f3f4f6); }
        .bg-app-red { background: linear-gradient(145deg, #fff1f2, #ffe4e6); }

        .app-label { font-size: 9px; font-weight: 700; color: #64748b; text-align: center; letter-spacing: -0.02em; }

        .color-btn { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); transition: transform 0.1s; }
        .color-btn:hover { transform: scale(1.2); }

        .btn-clear-all {
            margin-left: auto; color: #ef4444; cursor: pointer; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            background: #fee2e2; font-weight: bold; font-size: 10px; flex-shrink: 0;
        }

        .text-cyan-point { color: #0891b2; }
        .date-weather-window-width { width: 480px; } 
        .clock-window-width, .schedule-window-width { width: 330px; }
        
        #weather-icon { font-size: 50px; margin-left: 20px; position: relative; top: -5px; }
    </style>
</head>
<body class="pt-2 px-8 flex flex-col gap-6">

    <div id="confirm-modal" class="hidden fixed top-0 left-0 w-full h-full bg-black/30 z-[1000] items-center justify-center">
        <div class="bg-white p-6 rounded-xl shadow-xl text-center w-[300px]">
            <p class="text-lg font-bold mb-6">정말 모두 삭제하겠습니까?</p>
            <div class="flex gap-3 justify-center">
                <button onclick="executeClear()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">삭제</button>
                <button onclick="closeModal()" class="bg-gray-200 px-4 py-2 rounded-lg font-bold">취소</button>
            </div>
        </div>
    </div>

    <!-- 상단 영역 -->
    <header class="flex justify-between items-start">
        <div class="window-frame date-weather-window-width" style="height: 120px;">
            <div class="window-header"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="flex-grow flex items-center justify-center px-6">
                <div id="display-date" class="text-[40px] font-bold whitespace-nowrap"></div>
                <span id="weather-icon">--</span>
            </div>
        </div>
        <div class="window-frame clock-window-width" style="height: 120px;">
            <div class="window-header"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="flex-grow flex items-center justify-center">
                <div id="display-time" class="text-[70px] font-black leading-none text-center">00:00</div>
            </div>
        </div>
    </header>

    <!-- 중앙 영역 - 세로 높이를 지시하신 60vh로 수정 -->
    <main class="flex gap-8 h-[60vh]">
        <div class="window-frame flex-grow">
            <div class="browser-header">
                <div class="flex gap-2">
                    <div class="dot w-2 h-2 bg-red-400"></div><div class="dot w-2 h-2 bg-yellow-400"></div><div class="dot w-2 h-2 bg-green-400"></div>
                </div>
                <div class="address-bar-container">
                    <div class="flex gap-1.5 items-center">
                        <div class="color-btn bg-black" onclick="setChalkColor('#333333')"></div>
                        <div class="color-btn bg-red-500" onclick="setChalkColor('#ef4444')"></div>
                        <div class="color-btn bg-blue-500" onclick="setChalkColor('#3b82f6')"></div>
                        <div class="color-btn bg-green-500" onclick="setChalkColor('#22c55e')"></div>
                    </div>
                    <div class="h-3 w-[1px] bg-gray-200 mx-1"></div>
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Size</span>
                        <input type="number" id="font-size-input" value="50" min="10" max="200" class="bg-gray-100 rounded px-1 text-[10px] font-bold outline-none w-8 h-5 text-center" onchange="updateChalkStyle()">
                    </div>
                    <div class="btn-clear-all" onclick="showClearModal()">✕</div>
                </div>
            </div>
            <div class="flex-grow bg-white relative">
                <div id="blackboard-input" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>

        <div class="window-frame schedule-window-width">
            <div class="window-header flex justify-between items-center pr-4">
                <div class="flex gap-1.5"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div id="schedule-options" class="flex gap-1"></div>
            </div>
            <div id="schedule-list" class="flex-grow overflow-y-auto"></div>
        </div>
    </main>

    <!-- 하단 고정 도크 바 -->
    <div class="dock-container">
        <div class="dock-bar">
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-blue">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <span class="app-label">정리시간</span>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-green">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><circle cx="15.5" cy="15.5" r="1.5"></circle><circle cx="15.5" cy="8.5" r="1.5"></circle><circle cx="8.5" cy="15.5" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle></svg>
                </div>
                <span class="app-label">주사위</span>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-yellow">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"></path><path d="M5 2h14"></path><path d="M17 22c0-3.1-2-6-5-6s-5 2.9-5 6"></path><path d="M17 2c0 3.1-2 6-5 6s-5-2.9-5-6"></path><path d="M12 10.5v3"></path></svg>
                </div>
                <span class="app-label">타이머</span>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-purple">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                </div>
                <span class="app-label">랜덤레이스</span>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-gray">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg>
                </div>
                <span class="app-label">랜덤 뽑기</span>
            </div>
            <div class="app-icon-wrapper">
                <div class="app-icon-box bg-app-red">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#be123c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"></path><path d="M18.4 6.6a9 9 0 1 1-12.77.04"></path></svg>
                </div>
                <span class="app-label">블랙 아웃</span>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        async function fetchWeather() {
            try {
                const weatherPrompt = "경북 김천시 어모면의 현재 날씨 상태를 나타내는 이모지 1개만 JSON 형식으로 알려줘. (예: { \"icon\": \"☀️\" })";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: weatherPrompt }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { icon: { type: "STRING" } } } }
                    })
                });
                const result = await response.json();
                const weatherData = JSON.parse(result.candidates[0].content.parts[0].text);
                document.getElementById('weather-icon').textContent = weatherData.icon;
            } catch (error) { console.error("날씨 로드 실패:", error); }
        }

        function updateClock() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
            const day = dayNames[now.getDay()];
            document.getElementById('display-date').innerHTML = `
                <span class="text-cyan-point">${month}</span>월 
                <span class="text-cyan-point">${date}</span>일 
                <span class="text-cyan-point">${day}</span>요일
            `;
            let h = now.getHours() % 12 || 12;
            document.getElementById('display-time').textContent = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            updateScheduleHighlight();
        }

        function updateScheduleHighlight() {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const items = document.querySelectorAll('.schedule-item');
            items.forEach(item => {
                const timeStr = item.querySelector('.schedule-time')?.textContent;
                if (!timeStr) return;
                const timeMatch = timeStr.match(/(\d{2}):(\d{2})-(\d{2}):(\d{2})/);
                if (timeMatch) {
                    const startMin = parseInt(timeMatch[1]) * 60 + parseInt(timeMatch[2]);
                    const endMin = parseInt(timeMatch[3]) * 60 + parseInt(timeMatch[4]);
                    if (currentTime >= startMin && currentTime < endMin) item.classList.add('active-period');
                    else item.classList.remove('active-period');
                }
            });
        }

        function setChalkColor(color) {
            const input = document.getElementById('blackboard-input');
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && selection.toString().length > 0) {
                document.execCommand('foreColor', false, color);
            } else { input.style.color = color; input.focus(); }
            localStorage.setItem('chalk_color', color);
            localStorage.setItem('class_note', input.innerHTML);
        }

        function updateChalkStyle() {
            const size = document.getElementById('font-size-input').value;
            const input = document.getElementById('blackboard-input');
            input.style.fontSize = size + 'px';
            localStorage.setItem('chalk_size', size);
            localStorage.setItem('class_note', input.innerHTML);
        }

        function showClearModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function executeClear() {
            const input = document.getElementById('blackboard-input');
            input.innerHTML = "";
            localStorage.removeItem('class_note');
            closeModal();
        }

        function renderSchedule(items) {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = ''; 
            if (!items || !Array.isArray(items)) return;
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'schedule-item';
                const parts = item.trim().split(/\s+/);
                const label = parts[0];
                if (parts.length >= 2) {
                    const time = parts.slice(1).join(' '); 
                    let ts = '-0.03em'; 
                    if (label.includes('1교시')) ts = '-0.01em';
                    else if (label.includes('2교시')) ts = '0.02em';
                    else if (label.includes('3교시')) ts = '0.03em';
                    else if (label.includes('4교시')) ts = '0.035em'; 
                    else if (label.includes('5교시')) ts = '0.025em'; 
                    else if (label.includes('점심시간')) ts = '0.025em';
                    div.innerHTML = `<span class="schedule-label">${label}</span><span class="schedule-time" style="letter-spacing: ${ts};">${time}</span>`;
                } else {
                    div.innerHTML = `<span class="schedule-label" style="grid-column: span 2;">${item}</span>`;
                }
                listContainer.appendChild(div);
            });
            updateScheduleHighlight();
        }

        async function fetchSchedule() {
            const gasUrl = "https://script.google.com/macros/s/AKfycbzoCgmF_cfpNOaImXQ7yY0UPOZ5eDuH1whp7NKTdEAvjPWGO6y5GzvafqySyy3Oul1l/exec"; 
            try {
                const response = await fetch(`${gasUrl}?sheet=학생용_바탕화면`);
                const data = await response.json();
                const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
                const today = dayNames[new Date().getDay()];
                processScheduleData(data, today);
            } catch (error) {
                const demo = { "금": { "4": ["1교시 09:00-09:40", "2교시 09:50-10:30", "3교시 10:40-11:20", "4교시 11:30-12:10", "점심시간 12:10-13:10"], "5": ["1교시 09:00-09:40", "2교시 09:50-10:30", "3교시 10:40-11:20", "4교시 11:30-12:10", "점심시간 12:10-13:10", "5교시 13:10-13:50"] } };
                processScheduleData(demo, "금");
            }
        }

        function processScheduleData(data, dayKey) {
            const todayData = data[dayKey];
            const optionsContainer = document.getElementById('schedule-options');
            optionsContainer.innerHTML = ''; 
            if (todayData) {
                if (Array.isArray(todayData)) renderSchedule(todayData);
                else if (typeof todayData === 'object') {
                    const keys = Object.keys(todayData);
                    const savedTab = localStorage.getItem('selected_tab_' + dayKey);
                    const defaultTab = (savedTab && keys.includes(savedTab)) ? savedTab : keys[0];
                    keys.forEach((key) => {
                        const btn = document.createElement('button');
                        btn.className = `schedule-tab-btn ${key === defaultTab ? 'active' : ''}`;
                        btn.textContent = key.match(/\d+/) ? key.match(/\d+/)[0] : key.charAt(0);
                        btn.onclick = () => {
                            document.querySelectorAll('.schedule-tab-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            renderSchedule(todayData[key]);
                            localStorage.setItem('selected_tab_' + dayKey, key);
                        };
                        optionsContainer.appendChild(btn);
                    });
                    renderSchedule(todayData[defaultTab]);
                }
            }
        }

        window.onload = () => {
            updateClock(); setInterval(updateClock, 1000);
            fetchSchedule(); fetchWeather(); setInterval(fetchWeather, 1000 * 60 * 60); 
            const input = document.getElementById('blackboard-input');
            const savedNote = localStorage.getItem('class_note');
            const savedColor = localStorage.getItem('chalk_color');
            const savedSize = localStorage.getItem('chalk_size');
            if(savedNote) input.innerHTML = savedNote;
            if(savedColor) input.style.color = savedColor;
            document.getElementById('font-size-input').value = savedSize || "50";
            input.style.fontSize = (savedSize || "50") + 'px';
            input.addEventListener('input', () => localStorage.setItem('class_note', input.innerHTML));
        };
    </script>
</body>
</html>
