<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 운영 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 고운 돋움(700), 노토산스(900), 퍼블릭산스(숫자용) 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Gowun+Dodum:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 폰트 선명도 최적화 */
        * { -webkit-font-smoothing: subpixel-antialiased; text-rendering: geometricPrecision; }

        body {
            font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            background-color: #d8eeff;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* [핵심] 1920x1080 해상도 강제 재현 레이아웃 */
        #app-scaler {
            width: 1920px; height: 1080px;
            flex-shrink: 0; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); transform-origin: center center;
            display: flex; flex-direction: column;
            padding: 46px 60px; box-sizing: border-box; background-color: #d8eeff;
        }

        .window-frame {
            background: white; border-radius: 0.75rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .window-header {
            background: #f3f4f6; padding: 10px 18px; display: flex;
            gap: 8px; border-bottom: 1px solid #e5e7eb; height: 32px; flex-shrink: 0;
            align-items: center; justify-content: flex-start;
            border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem;
        }

        .dot-gray { width: 10px; height: 10px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }

        /* 칠판 상단 도구바 */
        .browser-header {
            background: #f3f4f6; padding: 6px 16px; display: flex;
            align-items: center; gap: 12px; border-bottom: 1px solid #e5e7eb;
        }

        .address-bar-container {
            background: white; flex-grow: 1; height: 24px; border-radius: 12px;
            border: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 10px; gap: 8px;
        }

        #blackboard-input {
            width: 100%; height: 100%; padding: 20px; border: none; outline: none;
            overflow-y: auto; line-height: 1.6; color: #333; font-weight: bold;
            white-space: pre-wrap; word-break: break-all; user-select: text;
        }

        .color-dot { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; }
        .color-dot:hover { transform: scale(1.3); }

        /* 시계 및 위젯 너비 설정 */
        #display-time { font-family: 'Public Sans', sans-serif; letter-spacing: -0.02em; }
        .date-weather-window-width { width: 800px; height: 200px; } 
        .blank-window-width { width: 354px; height: 200px; } 
        .clock-window-width { width: 550px; height: 200px; }
        .schedule-window-width { width: 550px; }

        /* 시정표 정밀 여백 및 자간 보정 */
        #schedule-list { position: relative; padding-bottom: 25px; }
        .schedule-item {
            display: grid; grid-template-columns: 220px 1fr;
            align-items: center; padding: 10px 15px 10px 21px; /* 왼쪽 여백 21px */
            border-bottom: 1px solid #f3f4f6; font-size: 45px;
            font-weight: 500; height: 90px;
            box-sizing: border-box; transition: background-color 0.4s ease;
            position: relative;
        }
        .schedule-label { color: #0891b2; font-weight: 700; text-align: center; line-height: 1; }
        .schedule-time { padding-left: 18px; font-family: 'Public Sans', sans-serif; font-weight: 400; color: #6b7280; line-height: 1; white-space: nowrap; }

        /* [교시별 자간 보정] */
        .spacing-1st .schedule-time { letter-spacing: -0.035em; }
        .spacing-2nd .schedule-time { letter-spacing: -0.015em; }
        .active-period { background-color: #fff9db !important; }

        #break-indicator {
            position: absolute; left: -12px; width: calc(100% + 12px); height: 5px;
            display: none; align-items: center; pointer-events: none; z-index: 50;
        }
        #break-indicator::before {
            content: '▶'; position: absolute; left: 0; color: #f59e0b;
            font-size: 2rem; animation: arrowBounce 0.8s infinite;
        }
        @keyframes arrowBounce { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(6px); } }

        /* 독 바 스타일 (원상복구) */
        .dock-container {
            position: absolute; bottom: 70px; left: 0; right: 0;
            display: flex; justify-content: center; pointer-events: none; z-index: 100;
        }
        .dock-bar {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px);
            border-radius: 1.5rem; padding: 10px 22px; display: flex; gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.5);
            align-items: center; pointer-events: auto;
        }
        .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .app-icon-wrapper:hover { transform: translateY(-6px); }
        .app-icon-box { 
            width: 52px; height: 52px; border-radius: 1.1rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.08), inset 0 2px 4px rgba(255,255,255,0.8); position: relative; overflow: hidden; 
        }
        .app-label { font-size: 9px; font-weight: 700; color: #64748b; text-align: center; }

        .bg-app-blue { background: linear-gradient(145deg, #e0f2fe, #bae6fd); }
        .bg-app-green { background: linear-gradient(145deg, #f0fdf4, #dcfce7); }
        .bg-app-yellow { background: linear-gradient(145deg, #fffbeb, #fef3c7); }
        .bg-app-purple { background: linear-gradient(145deg, #faf5ff, #f3e8ff); }
        .bg-app-gray { background: linear-gradient(145deg, #f9fafb, #f3f4f6); }
        .bg-app-red { background: linear-gradient(145deg, #fff1f2, #ffe4e6); }

        /* 모달 시스템 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 60px; border-radius: 40px; box-shadow: 0 30px 80px rgba(0,0,0,0.2); text-align: center; }
        #blackout-overlay { position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; background: black; display: none; z-index: 2000; }
        .exit-blackout { position: absolute; bottom: 60px; right: 60px; width: 90px; height: 90px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.7); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; }

        /* 정리시간 종료 텍스트 스타일 (고운 돋움 700) */
        .finished-msg {
            font-family: 'Gowun Dodum', sans-serif;
            font-weight: 700;
            color: #2563eb;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-clear-all {
            margin-left: auto; color: #ef4444; cursor: pointer; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            background: #fee2e2; font-weight: bold; font-size: 10px; line-height: 0;
        }
    </style>
</head>
<body>

    <div id="app-scaler">
        <!-- 블랙아웃 오버레이 -->
        <div id="blackout-overlay"><div class="exit-blackout" onclick="toggleBlackout()"><svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" cy="2" x2="12" y2="12"></line></svg></div></div>

        <!-- 확인 모달 -->
        <div id="confirm-modal" class="modal-overlay">
            <div class="modal-content">
                <p class="text-2xl font-bold mb-8">정말 모두 삭제하겠습니까?</p>
                <div class="flex gap-6 justify-center">
                    <button onclick="executeClear()" class="bg-red-500 text-white px-8 py-3 rounded-xl font-bold text-lg">삭제</button>
                    <button onclick="document.getElementById('confirm-modal').style.display='none'" class="bg-gray-200 px-8 py-3 rounded-xl font-bold text-lg">취소</button>
                </div>
            </div>
        </div>

        <!-- 정리시간 타이머 모달 (당근 아이콘 및 고운 돋움 700 적용) -->
        <div id="timer-modal" class="modal-overlay" onclick="closeAppModals(event)">
            <div class="modal-content" style="min-width: 850px;" onclick="event.stopPropagation()">
                <h2 id="timer-title" class="text-4xl font-bold mb-10 text-gray-400 uppercase tracking-widest">정리시간</h2>
                <div id="cleanup-display" class="text-[180px] font-black text-blue-600 leading-none mb-12">02:00</div>
                
                <div class="w-full bg-gray-100 h-10 rounded-full relative mb-20 overflow-visible">
                    <!-- 당근 목표 지점 -->
                    <div id="carrot-target" class="absolute -left-2 -top-14 w-16 h-16">
                        <svg viewBox="0 0 100 100">
                            <path d="M50 30 Q 70 30, 80 60 Q 60 90, 50 95 Q 40 90, 20 60 Q 30 30, 50 30" fill="#fb923c" />
                            <path d="M50 30 Q 55 10, 65 15 M 50 30 Q 50 5, 40 10 M 50 30 Q 45 10, 35 15" stroke="#4ade80" stroke-width="6" fill="none" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <!-- 게이지 바 및 토끼 -->
                    <div id="cleanup-bar" class="h-full rounded-full bg-blue-500 transition-all duration-1000 relative" style="width: 100%;">
                        <span id="runner-icon" class="absolute -right-10 -top-16 text-7xl">🐰</span>
                    </div>
                </div>

                <div class="flex gap-12 justify-center">
                    <button id="timer-ctrl-btn" onclick="toggleCleanupTimer()" class="w-24 h-24 rounded-3xl bg-blue-500 text-white flex items-center justify-center shadow-xl"><svg id="ctrl-icon" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
                    <button onclick="resetCleanupTimer()" class="w-24 h-24 rounded-3xl bg-gray-100 text-gray-500 flex items-center justify-center shadow-md"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>
                </div>
            </div>
        </div>

        <header class="flex gap-12 items-start mb-[50px]">
            <!-- 1. 날짜 및 날씨 창 -->
            <div class="window-frame date-weather-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex items-center justify-center px-10">
                    <div id="display-date" class="text-[80px] font-bold whitespace-nowrap"></div>
                    <span id="weather-icon" class="text-[90px] ml-10">🌤️</span>
                </div>
            </div>

            <!-- 2. 감정 카드 창 (텍스트 전용, B5:C84 연동) -->
            <div class="window-frame blank-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex flex-col items-center justify-center p-6 text-center">
                    <div id="emotion-word" class="text-[42px] font-black text-cyan-700 leading-tight mb-2">반가워</div>
                    <div id="emotion-desc" class="text-[20px] font-bold text-gray-500 leading-snug break-keep">길에서 우연히 친구를 만났을 때.</div>
                </div>
            </div>

            <!-- 3. 시계 창 (정중앙 배치) -->
            <div class="window-frame clock-window-width">
                <div class="window-header"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                <div class="flex-grow flex items-center justify-center relative">
                    <div class="relative flex items-center justify-center">
                        <div id="display-time" class="text-[125px] font-black leading-none">00:00</div>
                        <div id="display-ampm" class="absolute left-full ml-4 bottom-2 text-[25px] font-bold text-gray-400 whitespace-nowrap">--</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex gap-12 items-start"> 
            <!-- 칠판 -->
            <div class="window-frame flex-grow" style="height: 580px;">
                <div class="browser-header">
                    <div class="flex gap-2 items-center">
                        <div class="color-dot w-3 h-3 rounded-full bg-red-500" onclick="setChalkColor('#ef4444')"></div>
                        <div class="color-dot w-3 h-3 rounded-full bg-blue-500" onclick="setChalkColor('#3b82f6')"></div>
                        <div class="color-dot w-3 h-3 rounded-full bg-gray-800" onclick="setChalkColor('#333')"></div>
                    </div>
                    <div class="address-bar-container">
                        <input type="text" id="font-size-input" value="70px" onchange="updateChalkStyle()">
                        <div class="btn-clear-all" onclick="document.getElementById('confirm-modal').style.display='flex'">✕</div>
                    </div>
                </div>
                <div id="blackboard-input" contenteditable="true" spellcheck="false" class="flex-grow bg-white"></div>
            </div>

            <!-- 시정표 (정밀 자간 및 여백 적용) -->
            <div class="window-frame schedule-window-width" style="height: fit-content; overflow: visible;">
                <div class="window-header flex justify-between items-center pr-4">
                    <div class="flex gap-2"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                </div>
                <div id="schedule-list" style="overflow: visible; padding-bottom: 25px;">
                    <div id="break-indicator"></div>
                </div>
            </div>
        </main>

        <!-- [원상복구] 하단 도크 바 (6개 도구 완벽 유지) -->
        <div class="dock-container">
            <div class="dock-bar">
                <div class="app-icon-wrapper" onclick="openApp('timer')"><div class="app-icon-box bg-app-blue"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="app-label">정리시간</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/dice/?v=3.3.8&loc=other', 750, 425)"><div class="app-icon-box bg-app-green"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="8.5" cy="8.5" r="1.5"/><circle cx="15.5" cy="15.5" r="1.5"/><circle cx="15.5" cy="8.5" r="1.5"/><circle cx="8.5" cy="15.5" r="1.5"/><circle cx="12" cy="12" r="1.5"/></svg></div><span class="app-label">주사위</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/timer/?loc=other', 1500, 850)"><div class="app-icon-box bg-app-yellow"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2.5"><path d="M5 22h14M5 2h14M17 22c0-3.1-2-6-5-6s-5 2.9-5 6M17 2c0 3.1-2 6-5 6s-5-2.9-5-6M12 10.5v3"/></svg></div><span class="app-label">타이머</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/marble/?v=3.3.8&loc=other', 1500, 850)"><div class="app-icon-box bg-app-purple"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div><span class="app-label">랜덤레이스</span></div>
                <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/randombox/?v=3.3.8&loc=other', 1500, 850)"><div class="app-icon-box bg-app-gray"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div><span class="app-label">랜덤 뽑기</span></div>
                <div class="app-icon-wrapper" onclick="toggleBlackout()"><div class="app-icon-box bg-app-red"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#be123c" stroke-width="2.5"><path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.77.04"/></svg></div><span class="app-label">블랙 아웃</span></div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzoCgmF_cfpNOaImXQ7yY0UPOZ5eDuH1whp7NKTdEAvjPWGO6y5GzvafqySyy3Oul1l/exec";
        let cleanupInterval, cleanupSeconds = 120, isTimerRunning = false;

        function adjustScale() {
            const scaler = document.getElementById('app-scaler');
            if (!scaler) return;
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            scaler.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', adjustScale);

        // 감정 데이터 호출 (B5:C84 지정 범위 연동)
        async function fetchEmotionData() {
            try {
                const res = await fetch(`${GAS_URL}?sheet=학생용_바탕화면&range=B5:C84`);
                const data = await res.json();
                if (Array.isArray(data) && data.length > 0) {
                    const randomIdx = Math.floor(Math.random() * data.length);
                    const selected = data[randomIdx];
                    if(selected[0]) document.getElementById('emotion-word').textContent = selected[0]; 
                    if(selected[1]) document.getElementById('emotion-desc').textContent = selected[1]; 
                }
            } catch (e) { }
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=36.195&longitude=128.093&current_weather=true`);
                const data = await res.json(), code = data.current_weather.weathercode;
                const weatherMap = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 61: "🌧️", 71: "❄️", 95: "⚡" };
                document.getElementById('weather-icon').textContent = weatherMap[code] || "🌤️";
            } catch (e) { }
        }

        function updateClock() {
            const now = new Date(); const ampm = now.getHours() >= 12 ? '오후' : '오전'; const h = now.getHours() % 12 || 12;
            document.getElementById('display-date').innerHTML = `<span class="text-cyan-600">${now.getMonth() + 1}</span>월 <span class="text-cyan-600">${now.getDate()}</span>일 <span class="text-cyan-600">${["일","월","화","수","목","금","토"][now.getDay()]}</span>요일`;
            document.getElementById('display-time').textContent = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('display-ampm').textContent = ampm;
            updateScheduleHighlight();
        }

        function toggleCleanupTimer() {
            const icon = document.getElementById('ctrl-icon');
            if (isTimerRunning) { clearInterval(cleanupInterval); icon.innerHTML = '<path d="M8 5v14l11-7z"/>'; isTimerRunning = false;
            } else { cleanupInterval = setInterval(updateCleanupTimer, 1000); icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; isTimerRunning = true; }
        }

        function updateCleanupTimer() {
            if (cleanupSeconds <= 0) { 
                clearInterval(cleanupInterval);
                document.getElementById('timer-title').style.display = 'none';
                const display = document.getElementById('cleanup-display');
                display.textContent = "자리에 예쁘게 앉아 책을 펴요."; 
                display.className = "finished-msg text-[60px] leading-tight mb-20 px-12"; 
                document.getElementById('cleanup-bar').style.width = '0%';
                isTimerRunning = false; return;
            }
            cleanupSeconds--; const m = Math.floor(cleanupSeconds / 60), s = cleanupSeconds % 60;
            document.getElementById('cleanup-display').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            document.getElementById('cleanup-bar').style.width = `${(cleanupSeconds / 120) * 100}%`;
        }

        function resetCleanupTimer() {
            clearInterval(cleanupInterval); cleanupSeconds = 120; isTimerRunning = false;
            document.getElementById('timer-title').style.display = 'block';
            const display = document.getElementById('cleanup-display');
            display.textContent = "02:00";
            display.className = "text-[180px] font-black text-blue-600 leading-none mb-12";
            document.getElementById('cleanup-bar').style.width = '100%';
            document.getElementById('ctrl-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        }

        function updateScheduleHighlight() {
            const now = new Date(), currentMin = now.getHours() * 60 + now.getMinutes();
            const items = document.querySelectorAll('.schedule-item'), indicator = document.getElementById('break-indicator');
            let anyClassHighlighted = false, breakIndex = -1;
            items.forEach((item, index) => {
                const timeText = item.querySelector('.schedule-time')?.textContent;
                if (!timeText) return;
                const match = timeText.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                if (match) {
                    let sH = parseInt(match[1]); if (sH < 8) sH += 12; const sMin = sH * 60 + parseInt(match[2]);
                    let eH = parseInt(match[3]); if (eH < 8) eH += 12; const eMin = eH * 60 + parseInt(match[4]);
                    if (currentMin >= sMin && currentMin < eMin) { item.classList.add('active-period'); anyClassHighlighted = true; } else { item.classList.remove('active-period'); }
                    if (index < items.length - 1) {
                        const nText = items[index+1].querySelector('.schedule-time')?.textContent;
                        const nMatch = nText?.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                        if (nMatch) {
                            let nsH = parseInt(nMatch[1]); if (nsH < 8) nsH += 12; const nsMin = nsH * 60 + parseInt(nMatch[2]);
                            if (currentMin >= eMin && currentMin < nsMin) breakIndex = index + 1;
                        }
                    }
                }
            });
            if (breakIndex !== -1 && !anyClassHighlighted) {
                indicator.style.display = 'flex'; indicator.style.top = (90 * breakIndex) + 'px'; 
            } else { indicator.style.display = 'none'; }
        }

        async function fetchSchedule() {
            try {
                const res = await fetch(`${GAS_URL}?sheet=학생용_바탕화면`);
                const data = await res.json();
                const today = ["일","월","화","수","목","금","토"][new Date().getDay()];
                const list = document.getElementById('schedule-list'), indicator = document.getElementById('break-indicator');
                list.innerHTML = ''; list.appendChild(indicator);
                const items = data[today] || ["1교시 09:00-09:40", "2교시 09:50-10:30", "3교시 10:40-11:20", "4교시 11:30-12:10", "점심시간 12:10-1:10", "5교시 1:10-1:50"];
                items.forEach(item => {
                    const div = document.createElement('div'); div.className = 'schedule-item';
                    const parts = item.split(' ');
                    if(parts[0].includes("1교시")) div.classList.add("spacing-1st");
                    if(parts[0].includes("2교시")) div.classList.add("spacing-2nd");
                    div.innerHTML = `<span class="schedule-label">${parts[0]}</span><span class="schedule-time">${parts[1]}</span>`;
                    list.appendChild(div);
                });
                updateScheduleHighlight();
            } catch (e) { }
        }

        function openApp(id) { document.getElementById(`${id}-modal`).style.display = 'flex'; }
        function closeAppModals(e) { if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none'; }
        function openPopup(url, w, h) { const l = (screen.width - w) / 2, t = (screen.height - h) / 2; window.open(url, '_blank', `width=${w},height=${h},left=${l},top=${t},resizable=yes,scrollbars=yes`); }
        function toggleBlackout() { const el = document.getElementById('blackout-overlay'); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
        function setChalkColor(c) { document.getElementById('blackboard-input').style.color = c; }
        function updateChalkStyle() { document.getElementById('blackboard-input').style.fontSize = document.getElementById('font-size-input').value; }
        function executeClear() { document.getElementById('blackboard-input').innerHTML = ""; document.getElementById('confirm-modal').style.display='none'; }

        window.onload = () => { adjustScale(); updateClock(); setInterval(updateClock, 1000); fetchWeather(); fetchEmotionData(); fetchSchedule(); };
    </script>
</body>
