<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5교시 시정표 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Gowun+Dodum:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 폰트 선명도 최적화 */
        * { -webkit-font-smoothing: subpixel-antialiased; text-rendering: geometricPrecision; }

        body {
            font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            background-color: #d8eeff;
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #app-scaler {
            width: 1920px; height: 1080px;
            flex-shrink: 0; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); transform-origin: center center;
            display: flex; flex-direction: column;
            padding: 46px 60px; box-sizing: border-box; background-color: #d8eeff;
        }

        .window-frame {
            background: white; border-radius: 0.75rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .window-header {
            background: #f3f4f6; padding: 10px 18px; display: flex;
            gap: 8px; border-bottom: 1px solid #e5e7eb; height: 32px; flex-shrink: 0;
            align-items: center;
        }

        .dot-gray { width: 10px; height: 10px; border-radius: 50%; background: #d1d5db; }

        .schedule-window-width { width: 550px; } 

        .schedule-item {
            display: grid;
            grid-template-columns: 220px 1fr;
            align-items: center;
            padding: 10px 15px 10px 20px; 
            border-bottom: 1px solid #f3f4f6; 
            font-size: 45px;
            font-weight: 500;
            height: 90px;
            box-sizing: border-box;
            position: relative;
        }
        
        .schedule-label { color: #0891b2; font-weight: 700; text-align: center; line-height: 1; }
        .schedule-time { padding-left: 25px; font-family: 'Public Sans', sans-serif; font-weight: 400; color: #6b7280; line-height: 1; white-space: nowrap; }

        /* 1교시 자간 -0.04em 적용 확인용 */
        .item-1 .schedule-time { letter-spacing: -0.04em; }

        /* 시뮬레이션용 강조 */
        .active-period { background-color: #fff9db !important; }

        header { display: flex; justify-content: space-between; margin-bottom: 50px; }
        .dummy-box-date { width: 800px; height: 200px; background: rgba(255,255,255,0.5); border: 2px dashed #cbd5e1; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #94a3b8; }
        .dummy-box-clock { width: 550px; height: 200px; background: rgba(255,255,255,0.5); border: 2px dashed #cbd5e1; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #94a3b8; }
        
        main { display: flex; gap: 12px; }
        .dummy-blackboard { flex-grow: 1; height: 580px; background: rgba(255,255,255,0.5); border: 2px dashed #cbd5e1; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="app-scaler">
        <header>
            <div class="dummy-box-date">날짜 및 날씨 영역 (800px)</div>
            <div class="dummy-box-clock">시계 영역 (550px)</div>
        </header>

        <main>
            <div class="dummy-blackboard">칠판 영역</div>
            
            <!-- 5교시 시정표 실제 모습 -->
            <div class="window-frame schedule-window-width" style="height: fit-content;">
                <div class="window-header">
                    <div class="flex gap-2"><div class="dot-gray"></div><div class="dot-gray"></div><div class="dot-gray"></div></div>
                </div>
                <div style="padding-bottom: 25px;">
                    <div class="schedule-item item-1">
                        <span class="schedule-label">1교시</span>
                        <span class="schedule-time">09:00-09:40</span>
                    </div>
                    <div class="schedule-item active-period"> <!-- 현재 2교시 가정 -->
                        <span class="schedule-label">2교시</span>
                        <span class="schedule-time">09:50-10:30</span>
                    </div>
                    <div class="schedule-item">
                        <span class="schedule-label">3교시</span>
                        <span class="schedule-time">10:40-11:20</span>
                    </div>
                    <div class="schedule-item">
                        <span class="schedule-label">4교시</span>
                        <span class="schedule-time">11:30-12:10</span>
                    </div>
                    <div class="schedule-item">
                        <span class="schedule-label">점심시간</span>
                        <span class="schedule-time">12:10-1:10</span>
                    </div>
                    <div class="schedule-item">
                        <span class="schedule-label" style="color: #0891b2;">5교시</span>
                        <span class="schedule-time">1:10-1:50</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function adjustScale() {
            const scaler = document.getElementById('app-scaler');
            const targetW = 1920, targetH = 1080;
            const windowW = window.innerWidth, windowH = window.innerHeight;
            const scale = Math.min(windowW / targetW, windowH / targetH);
            scaler.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        window.addEventListener('resize', adjustScale);
        window.onload = adjustScale;
    </script>
</body>
</html>
