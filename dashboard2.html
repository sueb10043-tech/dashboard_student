<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학급 운영 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Gowun+Dodum:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #d8eeff; color: #444;
            user-select: none;
        }

        /* 공통 프레임 */
        .window-frame {
            background: white; border-radius: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .window-header {
            background: #f3f4f6; padding: 6px 12px; display: flex;
            gap: 6px; border-bottom: 1px solid #e5e7eb; height: 24px; flex-shrink: 0;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; }

        /* 칠판 도구바 */
        .browser-header {
            background: #f3f4f6; padding: 6px 16px; display: flex;
            align-items: center; gap: 12px; border-bottom: 1px solid #e5e7eb;
        }

        .address-bar-container {
            background: white; flex-grow: 1; height: 28px; border-radius: 14px;
            border: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 12px; gap: 12px;
        }

        #blackboard-input {
            width: 100%; height: 100%; padding: 12px; border: none; outline: none;
            overflow-y: auto; line-height: 1.6; color: #333; font-weight: bold;
            white-space: pre-wrap; word-break: break-all; user-select: text;
        }

        #display-time { font-family: 'Public Sans', sans-serif; letter-spacing: 0.05em; }
        #display-date { font-family: 'Gowun Dodum', sans-serif; letter-spacing: 0; }
        #display-ampm { font-family: 'Gowun Dodum', sans-serif; }

        /* 글씨 크기 입력창 화살표 제거 */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* 시정표 레이아웃 - 고수 수치 */
        .schedule-item {
            display: flex; align-items: flex-end; 
            padding: 0px 10px 15px 21px; 
            border-bottom: 1px solid #f3f4f6; font-size: 1.7rem; font-weight: 500;
            height: 64px; box-sizing: border-box; transition: background-color 0.4s ease;
            position: relative;
        }
        
        .schedule-label {
            width: 110px; flex-shrink: 0; color: #0891b2; font-weight: 700; text-align: center;
            letter-spacing: 0.1em; line-height: 1;
        }

        .schedule-time {
            flex-grow: 1; text-align: left; padding-left: 18px; 
            font-family: 'Public Sans', sans-serif; font-weight: 400;
            color: #6b7280; line-height: 1; white-space: nowrap; 
        }

        .active-period { background-color: #fff9db !important; }

        /* 쉬는시간 골든 옐로우 지시자 */
        #break-indicator {
            position: absolute; left: -12px; width: calc(100% + 12px); height: 3px;
            display: none; align-items: center; pointer-events: none; z-index: 50;
        }
        #break-indicator::before {
            content: '▶'; position: absolute; left: 0; color: #f59e0b;
            font-size: 1.3rem; animation: arrowBounce 0.8s infinite;
        }
        #break-indicator::after {
            content: ''; position: absolute; left: 22px; right: 0; height: 3px;
            background-color: rgba(245, 158, 11, 0.4);
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(4px); }
        }

        /* 하단 도크 바 (바닥 10px 고정) */
        .dock-container {
            position: fixed; bottom: 10px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100; pointer-events: none; 
        }

        .dock-bar {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(15px);
            border-radius: 1.5rem; padding: 10px 22px; display: flex; gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.5);
            align-items: center; pointer-events: auto; 
        }

        .app-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.2s; }
        .app-icon-wrapper:hover { transform: translateY(-6px); }
        .app-icon-box { width: 52px; height: 52px; border-radius: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(0,0,0,0.08), inset 0 2px 4px rgba(255,255,255,0.8); position: relative; overflow: hidden; }

        .bg-app-blue { background: linear-gradient(145deg, #e0f2fe, #bae6fd); }
        .bg-app-green { background: linear-gradient(145deg, #f0fdf4, #dcfce7); }
        .bg-app-yellow { background: linear-gradient(145deg, #fffbeb, #fef3c7); }
        .bg-app-purple { background: linear-gradient(145deg, #faf5ff, #f3e8ff); }
        .bg-app-gray { background: linear-gradient(145deg, #f9fafb, #f3f4f6); }
        .bg-app-red { background: linear-gradient(145deg, #fff1f2, #ffe4e6); }

        .app-label { font-size: 9px; font-weight: 700; color: #64748b; text-align: center; letter-spacing: -0.02em; }

        /* 삭제 버튼 ✕ 수평/수직 정중앙 */
        .btn-clear-all {
            margin-left: auto; color: #ef4444; cursor: pointer; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            background: #fee2e2; font-weight: bold; font-size: 10px; flex-shrink: 0;
            line-height: 0; padding: 0;
        }

        /* 날씨 보정 -5px */
        #weather-icon { font-size: 50px; margin-left: 20px; position: relative; top: -5px; }

        /* 모달 시스템 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center;
        }

        /* 정리시간 토끼 애니메이션 */
        .cleanup-modal-content { min-width: 480px; padding: 50px; }
        .progress-track {
            width: 100%; background: #f1f5f9; height: 20px; border-radius: 20px;
            margin: 30px 0 40px 0; overflow: visible; position: relative; border: 1px solid #e2e8f0;
        }
        #cleanup-bar {
            width: 100%; height: 100%; background: linear-gradient(90deg, #60a5fa, #3b82f6); 
            transition: width 1s linear; border-radius: 20px; position: relative;
        }
        #runner-icon { position: absolute; right: -20px; top: -35px; font-size: 36px; transition: right 1s linear; }
        .finish-line { position: absolute; left: 0; top: -20px; font-size: 20px; }

        .app-btn-icon {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-play { background-color: #3b82f6; color: white; }
        .btn-pause { background-color: #f59e0b; color: white; }
        .btn-reset { background-color: #f3f4f6; color: #6b7280; }

        /* 블랙아웃 */
        #blackout-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: none; z-index: 2000;
        }
        .exit-blackout {
            position: absolute; bottom: 40px; right: 40px; 
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.1);
            color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.3); transition: all 0.3s; opacity: 0.5;
        }
        .exit-blackout:hover { opacity: 1; transform: scale(1.1); border-color: white; box-shadow: 0 0 30px rgba(255,255,255,0.5); }

        .color-btn {
            width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1); transition: transform 0.1s;
        }
        .color-btn:hover { transform: scale(1.2); }
        .date-weather-window-width { width: 480px; } 
        .clock-window-width, .schedule-window-width { width: 330px; }
    </style>
</head>
<body class="pt-2 px-8 flex flex-col gap-6">

    <div id="blackout-overlay">
        <div class="exit-blackout" onclick="toggleBlackout()">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed top-0 left-0 w-full h-full bg-black/30 z-[1000] items-center justify-center">
        <div class="bg-white p-6 rounded-xl shadow-xl text-center w-[300px]">
            <p class="text-lg font-bold mb-6">정말 모두 삭제하겠습니까?</p>
            <div class="flex gap-3 justify-center">
                <button onclick="executeClear()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold">삭제</button>
                <button onclick="closeModal()" class="bg-gray-200 px-4 py-2 rounded-lg font-bold">취소</button>
            </div>
        </div>
    </div>

    <div id="timer-modal" class="modal-overlay" onclick="closeAppModals(event)">
        <div class="modal-content cleanup-modal-content" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-bold mb-4 text-gray-400 uppercase tracking-[0.2em]">정리시간</h2>
            <div id="cleanup-display" class="text-[120px] font-black text-blue-600 leading-none mb-4">02:00</div>
            <div class="progress-track">
                <div class="finish-line">🏁</div>
                <div id="cleanup-bar"><span id="runner-icon">🐰</span></div>
            </div>
            <div class="flex gap-6 justify-center">
                <button id="timer-ctrl-btn" onclick="toggleCleanupTimer()" class="app-btn-icon btn-play">
                    <svg id="ctrl-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button onclick="resetCleanupTimer()" class="app-btn-icon btn-reset">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-start">
        <div class="window-frame date-weather-window-width" style="height: 120px;">
            <div class="window-header"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="flex-grow flex items-center justify-center px-6">
                <div id="display-date" class="text-[40px] font-bold whitespace-nowrap"></div>
                <span id="weather-icon">--</span>
            </div>
        </div>
        <div class="window-frame clock-window-width" style="height: 120px;">
            <div class="window-header"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="flex-grow flex items-center justify-center relative">
                <!-- 오전/오후가 추가된 시계 레이아웃 -->
                <div class="flex items-end gap-2">
                    <div id="display-time" class="text-[70px] font-black leading-none">00:00</div>
                    <div id="display-ampm" class="text-[20px] font-bold pb-1 text-gray-500">--</div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex gap-8 h-[60vh]">
        <div class="window-frame flex-grow">
            <div class="browser-header">
                <div class="flex gap-2">
                    <div class="dot w-2 h-2 bg-red-400"></div><div class="dot w-2 h-2 bg-yellow-400"></div><div class="dot w-2 h-2 bg-green-400"></div>
                </div>
                <div class="address-bar-container">
                    <div class="flex gap-1.5 items-center">
                        <div class="color-btn bg-black" onclick="setChalkColor('#333333')"></div>
                        <div class="color-btn bg-red-500" onclick="setChalkColor('#ef4444')"></div>
                        <div class="color-btn bg-blue-500" onclick="setChalkColor('#3b82f6')"></div>
                        <div class="color-btn bg-green-500" onclick="setChalkColor('#22c55e')"></div>
                    </div>
                    <div class="h-3 w-[1px] bg-gray-200 mx-1"></div>
                    <div class="flex items-center gap-1.5">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Size</span>
                        <input type="number" id="font-size-input" value="50" min="10" max="200" class="bg-gray-100 rounded px-1 text-[10px] font-bold outline-none w-8 h-5 text-center" onchange="updateChalkStyle()">
                    </div>
                    <div class="btn-clear-all" onclick="showClearModal()">✕</div>
                </div>
            </div>
            <div class="flex-grow bg-white relative">
                <div id="blackboard-input" contenteditable="true" spellcheck="false"></div>
            </div>
        </div>
        <div class="window-frame schedule-window-width" style="overflow: visible;">
            <div class="window-header flex justify-between items-center pr-4">
                <div class="flex gap-1.5"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div id="schedule-options" class="flex gap-1"></div>
            </div>
            <div id="schedule-list" class="flex-grow overflow-y-auto relative" style="overflow-x: visible;">
                <div id="break-indicator"></div>
            </div>
        </div>
    </main>

    <div class="dock-container">
        <div class="dock-bar">
            <div class="app-icon-wrapper" onclick="openApp('timer')">
                <div class="app-icon-box bg-app-blue"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369a1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></div>
                <span class="app-label">정리시간</span>
            </div>
            <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/dice/?v=3.3.8&loc=other', 750, 425)">
                <div class="app-icon-box bg-app-green"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><circle cx="15.5" cy="15.5" r="1.5"></circle><circle cx="15.5" cy="8.5" r="1.5"></circle><circle cx="8.5" cy="15.5" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle></svg></div>
                <span class="app-label">주사위</span>
            </div>
            <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/timer/?loc=other', 1500, 850)">
                <div class="app-icon-box bg-app-yellow"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"></path><path d="M5 2h14"></path><path d="M17 22c0-3.1-2-6-5-6s-5 2.9-5 6"></path><path d="M17 2c0 3.1-2 6-5 6s-5-2.9-5-6"></path><path d="M12 10.5v3"></path></svg></div>
                <span class="app-label">타이머</span>
            </div>
            <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/marble/?v=3.3.8&loc=other', 1500, 850)">
                <div class="app-icon-box bg-app-purple"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7e22ce" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg></div>
                <span class="app-label">랜덤레이스</span>
            </div>
            <div class="app-icon-wrapper" onclick="openPopup('https://toolkit.i-scream.co.kr/apps/randombox/?v=3.3.8&loc=other', 1500, 850)">
                <div class="app-icon-box bg-app-gray"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><polyline points="16 11 18 13 22 9"></polyline></svg></div>
                <span class="app-label">랜덤 뽑기</span>
            </div>
            <div class="app-icon-wrapper" onclick="toggleBlackout()">
                <div class="app-icon-box bg-app-red"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#be123c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"></path><path d="M18.4 6.6a9 9 0 1 1-12.77.04"></path></svg></div>
                <span class="app-label">블랙 아웃</span>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        // 정중앙 팝업 창 함수
        function openPopup(url, w, h) {
            const left = (window.screen.availWidth - w) / 2 + (window.screenLeft || window.screenX || 0);
            const top = (window.screen.availHeight - h) / 2 + (window.screenTop || window.screenY || 0);
            window.open(url, '_blank', `width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=yes,menubar=no,toolbar=no`);
        }

        function openApp(appId) {
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
            document.getElementById(`${appId}-modal`).style.display = 'flex';
        }

        function closeAppModals(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
                if(e.target.id === 'timer-modal' && !isTimerRunning) resetCleanupTimer();
            }
        }

        // 정리시간 타이머 로직
        let cleanupInterval; let cleanupSeconds = 120; let isTimerRunning = false;
        function toggleCleanupTimer() {
            const btn = document.getElementById('timer-ctrl-btn');
            const icon = document.getElementById('ctrl-icon');
            if (isTimerRunning) {
                clearInterval(cleanupInterval);
                btn.className = "app-btn-icon btn-play";
                icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                isTimerRunning = false;
            } else {
                cleanupInterval = setInterval(updateCleanupTimer, 1000);
                btn.className = "app-btn-icon btn-pause";
                icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                isTimerRunning = true;
            }
        }

        function updateCleanupTimer() {
            if (cleanupSeconds <= 0) {
                clearInterval(cleanupInterval);
                document.getElementById('cleanup-display').textContent = "다 했어요!";
                document.getElementById('cleanup-bar').style.width = '0%';
                document.getElementById('runner-icon').textContent = "🏁";
                isTimerRunning = false; return;
            }
            cleanupSeconds--;
            const m = Math.floor(cleanupSeconds / 60); const s = cleanupSeconds % 60;
            document.getElementById('cleanup-display').textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            document.getElementById('cleanup-bar').style.width = `${(cleanupSeconds / 120) * 100}%`;
        }

        function resetCleanupTimer() {
            clearInterval(cleanupInterval); cleanupSeconds = 120; isTimerRunning = false;
            document.getElementById('cleanup-display').textContent = "02:00";
            document.getElementById('cleanup-bar').style.width = '100%';
            document.getElementById('runner-icon').textContent = "🐰";
            const btn = document.getElementById('timer-ctrl-btn');
            btn.className = "app-btn-icon btn-play";
            document.getElementById('ctrl-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
        }

        function toggleBlackout() {
            const el = document.getElementById('blackout-overlay');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        // 시정표 실시간 강조 및 쉬는시간 화살표 로직
        function updateScheduleHighlight() {
            const now = new Date();
            const currentMin = now.getHours() * 60 + now.getMinutes();
            const items = document.querySelectorAll('.schedule-item');
            const indicator = document.getElementById('break-indicator');
            
            let anyClassHighlighted = false;
            let breakIndex = -1;

            items.forEach((item, index) => {
                const timeText = item.querySelector('.schedule-time')?.textContent;
                if (!timeText) return;

                const match = timeText.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                if (match) {
                    let startH = parseInt(match[1]); if (startH < 8) startH += 12;
                    const startMin = startH * 60 + parseInt(match[2]);
                    let endH = parseInt(match[3]); if (endH < 8) endH += 12; 
                    const endMin = endH * 60 + parseInt(match[4]);

                    if (currentMin >= startMin && currentMin < endMin) {
                        item.classList.add('active-period'); anyClassHighlighted = true;
                    } else {
                        item.classList.remove('active-period');
                    }

                    if (index < items.length - 1) {
                        const nextTimeText = items[index+1].querySelector('.schedule-time')?.textContent;
                        const nextMatch = nextTimeText?.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
                        if (nextMatch) {
                            let nextStartH = parseInt(nextMatch[1]); if (nextStartH < 8) nextStartH += 12;
                            const nextStartMin = nextStartH * 60 + parseInt(nextMatch[2]);
                            if (currentMin >= endMin && currentMin < nextStartMin) breakIndex = index + 1;
                        }
                    }
                }
            });

            if (breakIndex !== -1 && !anyClassHighlighted) {
                indicator.style.display = 'flex'; indicator.style.top = (64 * breakIndex) + 'px';
            } else { indicator.style.display = 'none'; }
        }

        async function fetchWeather() {
            try {
                const weatherPrompt = "경북 김천시 어모면의 현재 날씨 상태를 나타내는 이모지 1개만 JSON 형식으로 알려줘. (예: { \"icon\": \"☀️\" })";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: weatherPrompt }] }], generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { icon: { type: "STRING" } } } } })
                });
                const result = await response.json();
                const weatherData = JSON.parse(result.candidates[0].content.parts[0].text);
                document.getElementById('weather-icon').textContent = weatherData.icon;
            } catch (error) { console.error("날씨 로드 실패:", error); }
        }

        function updateClock() {
            const now = new Date(); const month = now.getMonth() + 1; const date = now.getDate();
            const dayNames = ["일", "월", "화", "수", "목", "금", "토"]; const day = dayNames[now.getDay()];
            document.getElementById('display-date').innerHTML = `<span class="text-cyan-point">${month}</span>월 <span class="text-cyan-point">${date}</span>일 <span class="text-cyan-point">${day}</span>요일`;
            
            // 오전/오후 계산 로직
            const hours = now.getHours();
            const ampm = hours >= 12 ? '오후' : '오전';
            let displayHours = hours % 12 || 12;
            
            document.getElementById('display-time').textContent = `${String(displayHours).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('display-ampm').textContent = ampm;
            
            updateScheduleHighlight();
        }

        function setChalkColor(color) {
            const input = document.getElementById('blackboard-input');
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && selection.toString().length > 0) { document.execCommand('foreColor', false, color); } 
            else { input.style.color = color; input.focus(); }
            localStorage.setItem('chalk_color', color);
        }

        function updateChalkStyle() {
            const size = document.getElementById('font-size-input').value;
            const input = document.getElementById('blackboard-input');
            input.style.fontSize = size + 'px';
            localStorage.setItem('chalk_size', size);
        }

        function showClearModal() { document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function executeClear() { document.getElementById('blackboard-input').innerHTML = ""; localStorage.removeItem('class_note'); closeModal(); }

        function renderSchedule(items) {
            const listContainer = document.getElementById('schedule-list');
            const indicator = document.getElementById('break-indicator');
            listContainer.innerHTML = ''; listContainer.appendChild(indicator);
            if (!items || !Array.isArray(items)) return;
            items.forEach(item => {
                const div = document.createElement('div'); div.className = 'schedule-item';
                const parts = item.trim().split(/\s+/);
                if (parts.length >= 2) {
                    div.innerHTML = `<span class="schedule-label">${parts[0]}</span><span class="schedule-time">${parts.slice(1).join(' ')}</span>`;
                } else {
                    div.innerHTML = `<span class="schedule-label" style="width: 100%; text-align: left;">${item}</span>`;
                }
                listContainer.appendChild(div);
            });
            updateScheduleHighlight();
        }

        async function fetchSchedule() {
            const gasUrl = "https://script.google.com/macros/s/AKfycbzoCgmF_cfpNOaImXQ7yY0UPOZ5eDuH1whp7NKTdEAvjPWGO6y5GzvafqySyy3Oul1l/exec"; 
            try {
                const response = await fetch(`${gasUrl}?sheet=학생용_바탕화면`); const data = await response.json();
                const now = new Date(); const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
                processScheduleData(data, dayNames[now.getDay()]);
            } catch (error) {
                const demo = { "수": ["1교시 09:00-09:40", "2교시 09:50-10:30", "3교시 10:40-11:20", "4교시 11:30-12:10", "점심시간 12:10-1:10", "5교시 1:10-1:50"] };
                processScheduleData(demo, "수"); 
            }
        }

        function processScheduleData(data, dayKey) {
            const todayData = data[dayKey];
            if (todayData) {
                if (Array.isArray(todayData)) renderSchedule(todayData);
                else renderSchedule(todayData[Object.keys(todayData)[0]]);
            }
        }

        window.onload = () => {
            updateClock(); setInterval(updateClock, 1000);
            fetchSchedule(); fetchWeather(); setInterval(fetchWeather, 1000 * 60 * 60); 
            const input = document.getElementById('blackboard-input');
            const savedNote = localStorage.getItem('class_note');
            const savedColor = localStorage.getItem('chalk_color');
            const savedSize = localStorage.getItem('chalk_size');
            if(savedNote) input.innerHTML = savedNote;
            if(savedColor) input.style.color = savedColor;
            document.getElementById('font-size-input').value = savedSize || "50";
            input.style.fontSize = (savedSize || "50") + 'px';
            input.addEventListener('input', () => localStorage.setItem('class_note', input.innerHTML));
        };
    </script>
</body>
</html>
